services:
  postgres:
    image: postgres:16-alpine
    container_name: bebis_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bebis_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bebis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: